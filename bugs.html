<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Bug Tracker — Bug Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="toast-wrap" id="toastWrap"></div>
<div class="page page-app active">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar">
      <div class="tb-left" id="topbarTitle">Bug Tracker — Full Ledger</div>
      <div class="tb-right">
        <div class="bell-wrap">
          <button class="bell-btn" onclick="toggleBell()" title="Notifications">🔔<span class="bell-count" id="bellCount" style="display:none;">0</span></button>
          <div class="notif-panel" id="notifPanel">
            <div class="np-hd"><span class="np-title">Dispatches</span><span class="np-clear" onclick="clearNotifs()">Clear all</span></div>
            <div class="np-list" id="npList"><div class="np-empty">No dispatches on record.</div></div>
          </div>
        </div>
        <button class="btn btn-gold btn-sm" onclick="location.href='report.html'">✍ File New Report</button>
      </div>
    </div>
    <div id="pageContent" style="display:flex;flex-direction:column;flex:1;"></div>
  </main>
</div>
<div class="modal-bg" id="bugModal">
  <div class="modal">
    <div class="modal-hd"><div class="modal-title" id="mTitle">Bug File</div><div class="modal-close" onclick="closeModal()">✕</div></div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>
<script src="dsa.js"></script>
<script src="script.js"></script>
<script>
document.addEventListener('DOMContentLoaded', ()=>{
  checkAuth();
  loadSidebar('bugs');
  buildBugs();
  document.getElementById('pageContent').appendChild(document.getElementById('inner-bugs'));
  renderBugsPage();
});
</script>
</body>
</html>
